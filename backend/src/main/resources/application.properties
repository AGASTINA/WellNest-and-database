# Application Configuration
spring.application.name=wellnest-backend
server.port=3000

# Load .env from repo root or backend folder (local dev)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Database Configuration (H2 file - local dev, persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/wellnest_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL init configuration
spring.sql.init.mode=never

# Mail Configuration (Gmail example)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Mail behavior (local dev)
app.mail.fail-open=false

# JWT Configuration
jwt.secret=wellnestSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS512Algorithm
jwt.expiration=86400000

# OTP Configuration
otp.expiration.minutes=10

# Google OAuth
google.oauth.client-id=${GOOGLE_CLIENT_ID}

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000

# Logging
logging.level.com.wellnest=DEBUG
logging.level.org.springframework.security=DEBUG
